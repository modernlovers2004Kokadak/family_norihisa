<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>則久家　家系図</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;600;700&family=Shippori+Mincho:wght@400;600&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#1a1209;--paper:#f5efe3;--aged:#e0d0b4;--gold:#b8892a;
  --red:#8b2020;--muted:#7a6a55;--line:#c4a96a;
  --male-bg:#e8f0f8;--male-bd:#8aafd0;
  --female-bg:#f8e8f0;--female-bd:#d08aaf;
  --ado-bd:#c8a840;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Serif JP',serif;background:var(--paper);color:var(--ink);min-height:100vh;}
header{text-align:center;padding:1.2rem 1rem .9rem;border-bottom:2px solid var(--line);position:relative;}
header::after{content:'';display:block;position:absolute;left:50%;transform:translateX(-50%);background:var(--gold);width:60px;height:2px;bottom:-2px;}
header h1{font-family:'Shippori Mincho',serif;font-size:clamp(1.1rem,4vw,1.9rem);letter-spacing:.3em;}
header p{font-size:.68rem;color:var(--muted);margin-top:.25rem;letter-spacing:.2em;}
.legend{display:flex;gap:9px;justify-content:center;flex-wrap:wrap;padding:.5rem .8rem;font-size:.6rem;color:var(--muted);border-bottom:1px solid var(--aged);}
.legend-item{display:flex;align-items:center;gap:3px;}
.ld{width:9px;height:9px;border-radius:50%;border:1.5px solid;}
.ll{width:14px;height:2px;}
.lda{width:14px;height:0;border-top:2px dashed;}
.scroll-hint{text-align:center;font-size:.6rem;color:var(--muted);padding:.25rem;border-bottom:1px solid var(--aged);}
#outer{overflow-x:auto;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:24px 20px 48px;}
.card{
  display:inline-flex;flex-direction:column;
  width:160px;min-height:112px;
  background:#fff;border:1.5px solid var(--aged);border-radius:5px;
  padding:5px 4px;text-align:center;cursor:pointer;
  box-shadow:0 1px 5px rgba(0,0,0,.08);
  transition:transform .15s,box-shadow .15s,border-color .15s;
  white-space:normal;position:absolute;
}
.card:hover{transform:translateY(-2px);box-shadow:0 4px 14px rgba(0,0,0,.15);border-color:var(--gold);}
.card.male{border-top:3px solid var(--male-bd);}
.card.female{border-top:3px solid var(--female-bd);}
.card.adopted{border-style:dashed;border-color:var(--ado-bd);}
.card-name{font-family:'Shippori Mincho',serif;font-size:.65rem;font-weight:600;line-height:1.4;word-break:break-all;}
.card-date{font-size:.56rem;color:var(--ink);margin-top:1px;line-height:1.5;white-space:nowrap;}
.card-role{font-size:.44rem;color:var(--ink);margin-top:2px;font-weight:600;}
.card-tag{position:absolute;top:2px;right:2px;font-size:.38rem;background:var(--ado-bd);color:#fff;border-radius:2px;padding:0 2px;}
#dbg{display:none;position:fixed;inset:0;background:rgba(26,18,9,.52);z-index:100;align-items:center;justify-content:center;}
#dbg.open{display:flex;}
#dbox{background:var(--paper);border:2px solid var(--gold);border-radius:8px;padding:1.4rem;width:min(460px,92vw);max-height:85vh;overflow-y:auto;box-shadow:0 20px 50px rgba(0,0,0,.25);}
.dh{display:flex;align-items:flex-start;gap:10px;margin-bottom:.9rem;padding-bottom:.7rem;border-bottom:1px solid var(--aged);}
.dav{width:44px;height:44px;border-radius:50%;flex-shrink:0;border:2px solid var(--aged);}
.dav.male{background:var(--male-bg);border-color:var(--male-bd);}
.dav.female{background:var(--female-bg);border-color:var(--female-bd);}
.dnm{font-family:'Shippori Mincho',serif;font-size:1.05rem;font-weight:600;}
.drl{font-size:.65rem;color:var(--gold);margin-top:1px;}
.dcl{margin-left:auto;background:none;border:none;font-size:1.2rem;color:var(--muted);cursor:pointer;}
.dgr{display:grid;grid-template-columns:80px 1fr;gap:4px 8px;font-size:.73rem;}
.dk{color:var(--muted);font-size:.63rem;}
.dv{color:var(--ink);word-break:break-word;line-height:1.5;}
.ds{font-size:.58rem;color:var(--gold);grid-column:1/-1;margin-top:7px;padding-bottom:2px;border-bottom:1px solid var(--aged);}
.dm{margin-top:.8rem;padding:.65rem;background:#fff;border-radius:5px;border:1px solid var(--aged);font-size:.71rem;line-height:1.7;white-space:pre-wrap;}
.dmt{font-size:.58rem;color:var(--muted);margin-bottom:3px;}
.tools{position:fixed;bottom:1rem;right:1rem;z-index:10;}
.tbtn{padding:6px 11px;background:var(--ink);color:var(--paper);border:none;border-radius:4px;font-size:.68rem;cursor:pointer;opacity:.82;}
@media print{.tools,.scroll-hint{display:none!important;}}
</style>
</head>
<body>
<header>
  <h1>則久家　家系図</h1>

const wrs=y=>{if(!y)return'';const yr=+y;for(const e of ERAS)if(yr>=e.s)return e.n[0]+(yr-e.s+1);return y;};
const wareki=y=>{if(!y)return'';const yr=+y;for(const e of ERAS)if(yr>=e.s)return e.n+(yr-e.s+1===1?'元':yr-e.s+1)+'年';return y+'年';};
const calcAge=(b,d)=>{const br=+b;return isNaN(br)?'':(d?+d:new Date().getFullYear())-br;};
const mdp=md=>{if(!md)return'';const m=md.match(/(\d+月\d+日)/);return m?m[1]:'';}

function mkCard(id){
  const p=P[id]; if(!p) return document.createElement('div');
  const el=document.createElement('div');
  el.className='card '+(p.g==='m'?'male':'female')+(p.adopted?' adopted':'');
  el.dataset.pid=id;
  if(p.adopted){const t=document.createElement('div');t.className='card-tag';t.textContent='養子';el.appendChild(t);}
  const nm=document.createElement('div');nm.className='card-name';nm.textContent=p.name;el.appendChild(nm);
  if(p.b){
    const b=document.createElement('div');b.className='card-date';
    b.textContent='生 '+p.b+'('+wrs(p.b)+')'+(mdp(p.bMd)?' '+mdp(p.bMd):'');el.appendChild(b);
    if(p.d){
      const d=document.createElement('div');d.className='card-date';
      d.textContent='没 '+p.d+'('+wrs(p.d)+')'+(mdp(p.dMd)?' '+mdp(p.dMd):'');el.appendChild(d);
      const a=calcAge(p.b,p.d);
      if(a!==''){const ae=document.createElement('div');ae.className='card-date';ae.textContent='享年 '+a+'歳';el.appendChild(ae);}
    }
  }
  if(p.role){const r=document.createElement('div');r.className='card-role';r.textContent=p.role;el.appendChild(r);}
  el.addEventListener('click',()=>openD(id));
  return el;
}

function buildTree(){
  const tree=document.getElementById('tree');
  tree.innerHTML='';

  // ── 座標定数（すべてここで一括定義）──
  const CW=160, SW=140, RH=112, CONN=36, SYM=16;

  // 列X座標（左端）
  // G4の9兄弟を基準列とする（間隔6px）
  const GAP=6;
  const sibX=Array.from({length:9},(_,i)=>i*(SW+GAP)); // 9兄弟の左端X

  // G4幅
  const G4W=sibX[8]+SW; // 最右端

  // G2: 倉治・乙松・＝・リユウ を配置
  // 乙松をsibX[5]、リユウをsibX[5]+CW+SYM に固定
  const X_OTO   = sibX[5];
  const X_SYM2  = X_OTO + CW;           // ＝記号の左端
  const X_RYUU  = X_SYM2 + SYM;         // リユウの左端
  const X_KURAJI= X_OTO - CW - GAP;     // 倉治（乙松の左隣）

  // G1: 紋治は乙松の真上、虎蔵はリユウの真上、林竹治はsibX[0]の真上
  const X_MONTJI = X_OTO;
  const X_TORAZO = X_RYUU;              // リユウと同じ左端
  const X_HAYASHI= sibX[0];

  // G3: 惣吉＝武免
  // 惣吉をsibX[3]、武免をsibX[3]+CW+SYM
  const X_SOKI  = sibX[3];
  const X_SYM3  = X_SOKI + CW;
  const X_TAKE  = X_SYM3 + SYM;

  // G5: 蕃＝カスヱ
  const X_SHIG5 = sibX[0];
  const X_SYM5  = X_SHIG5 + CW;
  const X_KASUE = X_SYM5 + SYM;

  // G6: 4人
  const g6X=Array.from({length:4},(_,i)=>i*(CW+GAP));

  // 行のtopY（行インデックス）
  // 0=G1, 1=conn, 2=G2, 3=conn, 4=G3, 5=conn, 6=G4, 7=conn, 8=G5, 9=conn, 10=G6
  const rowH=[RH,CONN,RH,CONN,RH,CONN,RH,CONN,RH,CONN,RH];
  const rowY=[0];
  rowH.forEach(h=>rowY.push(rowY[rowY.length-1]+h));
  const totalH=rowY[rowY.length-1];

  // 全体幅（G4幅かG2幅の大きい方）
  const totalW=Math.max(G4W, X_RYUU+CW)+20;

  // ── ラッパー ──
  const wrap=document.createElement('div');
  wrap.style.cssText=`position:relative;width:${totalW}px;height:${totalH}px;`;

  // カード配置ヘルパー（wはオプション、省略時はCW）
  function place(id, x, rowIdx, w){
    const c=mkCard(id);
    c.style.left=x+'px';
    c.style.top=rowY[rowIdx]+'px';
    c.style.width=(w||CW)+'px';
    wrap.appendChild(c);
  }
  // ＝記号配置
  function placeSym(x, rowIdx){
    const s=document.createElement('div');
    s.textContent='＝';
    s.style.cssText=`position:absolute;left:${x}px;top:${rowY[rowIdx]+RH/2-10}px;`+
      `width:${SYM}px;text-align:center;font-size:.7rem;color:var(--red);`;
    wrap.appendChild(s);
  }

  // ── カード配置 ──
  // G1
  place('hayashi', X_HAYASHI, 0);
  place('montji',  X_MONTJI,  0);
  place('torazo',  X_TORAZO,  0);
  // G2
  place('kuraji',   X_KURAJI, 2);
  place('otomatsu', X_OTO,    2);
  placeSym(X_SYM2, 2);
  place('ryuu',     X_RYUU,   2);
  // G3
  place('sokichi', X_SOKI, 4);
  placeSym(X_SYM3, 4);
  place('takeme',  X_TAKE, 4);
  // G4
  const sib4=['shigeru','toshio','risano','ryoichi','satoru','kenichi','chieko_n','chiaki','shizuo'];
  sib4.forEach((id,i)=>place(id, sibX[i], 6, SW));
  // G5
  place('shigeru', X_SHIG5, 8);
  placeSym(X_SYM5, 8);
  place('kasue',   X_KASUE, 8);
  // G6
  const sib6=['yoshiro','shozo','masako_n','naruko'];
  sib6.forEach((id,i)=>place(id, g6X[i], 10, SW));

  // ── SVG罫線 ──
  const svg=document.createElementNS('http://www.w3.org/2000/svg','svg');
  svg.setAttribute('width', totalW);
  svg.setAttribute('height', totalH);
  svg.style.cssText='position:absolute;top:0;left:0;pointer-events:none;overflow:visible;';

  const LC='var(--line)', LA='var(--ado-bd)';

  function seg(x1,y1,x2,y2,col,dash){
    const l=document.createElementNS('http://www.w3.org/2000/svg','line');
    l.setAttribute('x1',x1);l.setAttribute('y1',y1);
    l.setAttribute('x2',x2);l.setAttribute('y2',y2);
    l.setAttribute('stroke',col||LC);l.setAttribute('stroke-width','2');
    if(dash)l.setAttribute('stroke-dasharray','5,3');
    svg.appendChild(l);
  }
  function poly(pts,col,dash){
    const p=document.createElementNS('http://www.w3.org/2000/svg','polyline');
    p.setAttribute('points',pts.map(([x,y])=>x+','+y).join(' '));
    p.setAttribute('fill','none');p.setAttribute('stroke',col||LC);p.setAttribute('stroke-width','2');
    if(dash)p.setAttribute('stroke-dasharray','5,3');
    svg.appendChild(p);
  }

  // カード中心X（左端X→中心）
  const cc=x=>x+CW/2;
  // 行のカード底辺Y
  const bot=ri=>rowY[ri]+RH;
  // 行のカード上辺Y
  const top=ri=>rowY[ri];

  // G1紋治 → G2乙松（垂直）
  seg(cc(X_MONTJI), bot(0), cc(X_OTO), top(2));

  // G1紋治 → G2倉治（L字）
  const my12=(bot(0)+top(2))/2;
  poly([[cc(X_MONTJI),bot(0)],[cc(X_MONTJI),my12],[cc(X_KURAJI),my12],[cc(X_KURAJI),top(2)]]);

  // G1虎蔵 → G2リユウ（垂直）
  seg(cc(X_TORAZO), bot(0), cc(X_RYUU), top(2));

  // G2乙松＝リユウ中央 → G3惣吉（養子破線）
  const g2midX=(cc(X_OTO)+cc(X_RYUU))/2;
  const g3sokiCX=cc(X_SOKI);
  const my23=(bot(2)+top(4))/2;
  poly([[g2midX,bot(2)],[g2midX,my23],[g3sokiCX,my23],[g3sokiCX,top(4)]], LA, true);

  // G1林竹治 → G3惣吉左側（養子破線）
  const hayashiCX=cc(X_HAYASHI);
  const sokiMidY=rowY[4]+RH/2;
  poly([[hayashiCX,bot(0)],[hayashiCX,sokiMidY],[X_SOKI,sokiMidY]], LA, true);

  // G3武免 → G4 9兄弟
  const takeCX=cc(X_TAKE);
  const my34=(bot(4)+top(6))/2;
  seg(takeCX, bot(4), takeCX, my34);
  seg(cc(sibX[0]), my34, cc(sibX[8]), my34);
  sibX.forEach(x=>seg(cc(x), my34, cc(x), top(6)));

  // G4蕃 → G5蕃（垂直）
  seg(cc(sibX[0]), bot(6), cc(X_SHIG5), top(8));

  // G5カスヱ → G6 4人
  const kasueCX=cc(X_KASUE);
  const my56=(bot(8)+top(10))/2;
  seg(kasueCX, bot(8), kasueCX, my56);
  seg(cc(g6X[0]), my56, cc(g6X[3]), my56);
  g6X.forEach(x=>seg(cc(x), my56, cc(x), top(10)));

  wrap.appendChild(svg);
  tree.appendChild(wrap);
}

function openD(id){
  const p=P[id];if(!p)return;
  document.getElementById('dav').className='dav '+(p.g==='m'?'male':'female');
  document.getElementById('dnm').textContent=p.name||'—';
  document.getElementById('drl').textContent=p.role||'';
  const g=document.getElementById('dgr');g.innerHTML='';
  const row=(k,v)=>{if(!v)return;const kd=document.createElement('div');kd.className='dk';kd.textContent=k;const vd=document.createElement('div');vd.className='dv';vd.textContent=v;g.appendChild(kd);g.appendChild(vd);};
  const sec=t=>{const s=document.createElement('div');s.className='ds';s.textContent=t;g.appendChild(s);};
  sec('── 基本情報 ──');
  row('性別',p.g==='m'?'男性':'女性');
  if(p.b){row('生年月日',p.bMd||(p.b+'年'));row('生年（西暦/和暦）',p.b+'年（'+wareki(p.b)+'）');}
  if(p.d){row('没年月日',p.dMd||(p.d+'年'));row('没年（西暦/和暦）',p.d+'年（'+wareki(p.d)+'）');}
  const mw=document.getElementById('dmw'),me=document.getElementById('dme');
  if(p.memo){me.textContent=p.memo;mw.style.display='block';}else{mw.style.display='none';}
  document.getElementById('dbg').classList.add('open');
}
function closeD(e){if(!e||e.target===document.getElementById('dbg'))document.getElementById('dbg').classList.remove('open');}
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeD();});
buildTree();
</script>
